{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Healtho</title>
    <link rel="stylesheet" href="{% static 'chatbot/css/style.css' %}">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="glow glow-one"></div>
        <div class="glow glow-two"></div>

        <div class="auth-card">
            <div class="logo-box small-logo">🩺</div>

            <h1>Login to Healtho</h1>

            <p class="auth-subtitle">
                Continue your AI-powered healthcare assistant journey.
            </p>

            {% if error %}
                <p class="error-message">{{ error }}</p>
            {% endif %}

            <form method="POST" class="auth-form">
                {% csrf_token %}

                <div class="input-group">
                    <label>Username</label>
                    <input 
                        type="text" 
                        name="username" 
                        placeholder="Enter your username" 
                        required
                    >
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input 
                        type="password" 
                        name="password" 
                        placeholder="Enter your password" 
                        required
                    >
                </div>

                <button type="submit" class="auth-btn">
                    Login
                </button>
            </form>

            <p class="switch-text">
                New user?
                <a href="{% url 'signup' %}">Create account</a>
            </p>

            <a href="{% url 'home' %}" class="back-home">
                ← Back to Home
            </a>
        </div>
    </div>

</body>
</html>
